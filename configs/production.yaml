# Aurika AIP Production Profile
environment: production
log_level: WARNING
storage:
  type: postgres
  url: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
cache:
  type: redis
  host: "redis"
  port: 6379
security:
  jwt_secret: "${JWT_SECRET_KEY}"
  enable_cors: false
  rate_limit_per_min: 100
